name: Cross-Platform CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-13, windows-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
        components: rustfmt, clippy

    - name: Cache cargo dependencies
      uses: Swatinem/rust-cache@v2
      with:
        key: ${{ matrix.os }}-${{ matrix.target }}

    - name: Check formatting
      run: cargo fmt -- --check
      continue-on-error: true

    - name: Run clippy
      run: cargo clippy --workspace -- -D warnings
      continue-on-error: true

    - name: Build workspace
      run: cargo build --workspace --release

    - name: Build demo binary
      run: cargo build --bin demo --release

    - name: Run tests
      run: cargo test --workspace --release
      timeout-minutes: 30

    - name: Run demo (auto-run mode)
      run: cargo run --bin demo -- --auto-run
      timeout-minutes: 5

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: matrix.os == 'ubuntu-latest'
      with:
        name: drc-binaries-${{ matrix.os }}
        path: |
          target/release/demo
          target/release/drc
        retention-days: 7

  cross-compilation:
    name: Cross Compile (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install cross-compilation tools
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf

    - name: Build for target
      run: |
        cargo build --workspace --release --target ${{ matrix.target }}
      env:
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc

  demo-validation:
    name: Demo Validation
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo
      uses: Swatinem/rust-cache@v2

    - name: Build and run demo
      run: |
        echo "Building demo..."
        cargo build --bin demo --release
        echo "Running demo in auto-run mode..."
        timeout 120 cargo run --bin demo -- --auto-run || true
      shell: bash
      timeout-minutes: 5

    - name: Verify demo output (Unix)
      if: runner.os != 'Windows'
      run: |
        cargo run --bin demo -- --auto-run 2>&1 | tee demo_output.txt &
        sleep 30
        if grep -q "All demos completed" demo_output.txt; then
          echo "Demo completed successfully!"
          exit 0
        else
          echo "Demo may not have completed - checking for progress..."
          if grep -q "DRC - Deterministic Replay Compute" demo_output.txt; then
            echo "Demo started successfully"
            exit 0
          fi
          exit 1
        fi
      timeout-minutes: 2
      continue-on-error: true

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-audit
      run: cargo install cargo-audit

    - name: Run security audit
      run: cargo audit
      continue-on-error: true

  documentation:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Check documentation
      run: cargo doc --workspace --no-deps
      env:
        RUSTDOCFLAGS: -D warnings
      continue-on-error: true
